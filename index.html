<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo_container">
            <a href=""><img class="myntra-home" src="./images/myntra_logo.png" alt=""></a>
        </div>
        <div class="nav_bar">
            <a href="">Men</a>
            <a href="">Women</a>
            <a href="">Kids</a>
            <a href="">Home & Living</a>
            <a href="">Beauty</a>
            <a href="">Studio <sup>New</sup></a>
        </div>
        <div class="search_bar">
            <span class="material-symbols-outlined search_icon">
                search
            </span>
            <input class="search_input" placeholder="Search for products, brands and more">
        </div>

        <div class="action_bar">
            <div class="action_container">
                <span class="material-symbols-outlined action_icon">
                    person
                </span>
                <span class="action_name">Profile</span>
            </div>
            <div class="action_container">
                <span class="material-symbols-outlined action_icon">
                    favorite
                </span>
                <span class="action_name">Wishlist</span>
            </div>
            <div class="action_container">
                <span class="material-symbols-outlined action_icon">
                    shopping_bag
                </span>

                <span class="action_name">Bag</span>
            </div>
        </div>
    </header>

    <main>Main
        <div class="banner_container">Banner Container</div>
        <div class="category_heading">Category Heading</div>
        <div class="category_items">Items</div>
    </main>

    <footer>Footer</footer>
</body>

</html>
